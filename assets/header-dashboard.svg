<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 120" width="100%" height="100%">
    <defs>
        <!-- Background Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
        </pattern>
    </defs>
    
    <!-- Base Background -->
    <rect width="100%" height="100%" fill="#090c10" rx="8" ry="8"/>
    <rect width="100%" height="100%" fill="url(#grid)" rx="8" ry="8"/>
    
    <!-- Title Text -->
    <text x="30" y="70" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="32">Visual Dashboard &amp; <tspan fill="#64d9a8">Automation</tspan></text>
    
    <!-- Decorative element -->
    <rect x="30" y="85" width="60" height="4" rx="2" fill="#64d9a8" />
</svg>
