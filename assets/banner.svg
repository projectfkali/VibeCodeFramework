<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" width="100%" height="100%">
    <defs>
        <!-- Background Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
        </pattern>
        <!-- Glow Effect for Framework Text -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Base Background -->
    <rect width="100%" height="100%" fill="#090c10" rx="8" ry="8"/>
    
    <!-- Grid Overlay -->
    <rect width="100%" height="100%" fill="url(#grid)" rx="8" ry="8"/>
    
    <!-- Top Bar (Mac OS style dots) -->
    <circle cx="24" cy="24" r="6" fill="#ff5f56"/>
    <circle cx="44" cy="24" r="6" fill="#ffbd2e"/>
    <circle cx="64" cy="24" r="6" fill="#27c93f"/>
    
    <!-- Top Bar Title -->
    <text x="425" y="28" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">README.md — vibecoding-framework</text>
    
    <g transform="translate(60, 100)">
        <!-- Badges Container -->
        <g transform="translate(0, 0)">
            <!-- v0.1.0-alpha Badge -->
            <rect x="0" y="0" width="110" height="26" rx="13" fill="#0d1117" stroke="#2ea043" stroke-width="1" opacity="0.6"/>
            <text x="55" y="17" fill="#64d9a8" font-family="monospace" font-size="12" text-anchor="middle">v0.1.0-alpha</text>
            
            <!-- MIT License Badge -->
            <rect x="120" y="0" width="100" height="26" rx="13" fill="#0d1117" stroke="#388bfd" stroke-width="1" opacity="0.6"/>
            <text x="170" y="17" fill="#58a6ff" font-family="monospace" font-size="12" text-anchor="middle">MIT License</text>
            
            <!-- Status Badge -->
            <rect x="230" y="0" width="160" height="26" rx="13" fill="#0d1117" stroke="#d29922" stroke-width="1" opacity="0.6"/>
            <text x="310" y="17" fill="#fbbf24" font-family="monospace" font-size="12" text-anchor="middle">active development</text>
        </g>

        <!-- Main Title Text -->
        <text x="0" y="100" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="72" letter-spacing="-2">VibeCoding</text>
        
        <!-- Framework Text (Green) -->
        <text x="0" y="170" fill="#64d9a8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="72" letter-spacing="-2">Framework</text>
        
        <!-- Subtitle Text -->
        <text x="0" y="230" fill="#4b5563" font-family="monospace" font-size="16">// a methodology, not just a prompt library</text>
        
        <!-- Paragraph Text -->
        <text x="0" y="280" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400">
            You're already using AI to write code. But your sessions are <tspan fill="#d1d5db" font-weight="600">inconsistent</tspan>, your
        </text>
        <text x="0" y="315" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400">
            prompts are <tspan fill="#d1d5db" font-weight="600">improvised</tspan>, and your results depend on luck as much as skill.
        </text>
    </g>
</svg>
